<!doctype html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Matemático Digital UEEH</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              moodle: {
                orange: '#F47C20',
                'dark-blue': '#1E293B',
                'text-blue': '#313849',
                'text-gray': '#6B7280',
                'bg-light': '#F3F4F6',
                'bg-white': '#FFFFFF'
              }
            }
          }
        }
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)']],
          displayMath: [['\\[', '\\]']]
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>

  <body class="min-h-screen relative overflow-x-hidden selection:bg-moodle-orange/30 selection:text-orange-900">
    <div class="app-shell min-h-screen">
      <main id="app" class="w-full"></main>
    </div>

    <script type="module" src="./assets/js/main.js"></script>
  </body>
</html>
